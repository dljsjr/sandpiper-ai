id: no-any-type
language: TypeScript
rule:
  kind: predefined_type
  regex: "^any$"
  not:
    inside:
      kind: comment
      stopBy: end
severity: warning
message: "Avoid `any` type. Use `unknown` and narrow with type guards, or define proper types."
note: "Per AGENTS.md TypeScript guidelines. biome-ignore comments for Commander generics are an approved exception."
ignores:
  - "**/*.test.ts"
  - "devtools/ascii-motion.ts"
  - "draw-sandpiper.ts"
  # Commander's generic params require `any` — approved via biome-ignore in helpers.ts
  - "packages/sandpiper-tasks-cli/src/commands/**"
